<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorldMaps Studio</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #1a1a1a; color: #eee;
                   font-family: system-ui, -apple-system, sans-serif; }
      #app { display: flex; flex-direction: column; height: 100vh; }
      header { padding: 8px 16px; font-size: 14px; border-bottom: 1px solid #333; }
      main { flex: 1; display: flex; min-height: 0; }
      #canvas-wrap { flex: 1; display: flex; align-items: center; justify-content: center;
                     padding: 16px; min-width: 0; min-height: 0; }
      canvas { max-width: 100%; max-height: 100%; image-rendering: pixelated;
               border: 1px solid #333; background: #000; }
      #panel { width: 280px; padding: 12px; border-left: 1px solid #333; overflow-y: auto; }
      #status { font-size: 12px; opacity: 0.7; padding: 4px 16px; border-top: 1px solid #333; }
    </style>
  </head>
  <body>
    <div id="app">
      <header>WorldMaps Studio · Phase 4 (BP 2 preview)</header>
      <main>
        <div id="canvas-wrap"><canvas id="canvas" width="1024" height="512"></canvas></div>
        <div id="panel"></div>
      </main>
      <div id="status">initializing…</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
